<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <title>BOGO CAFE - Test API</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{font-family:Arial,sans-serif;max-width:760px;margin:40px auto;padding:0 16px;background:#f7f3ed;color:#2d241c}
    input,button,textarea{width:100%;padding:12px;margin:8px 0;border-radius:10px;border:1px solid #c8b9a6}
    button{background:#5b3b22;color:#fff;font-weight:bold;cursor:pointer}
    pre{background:#fff;padding:16px;border-radius:12px;white-space:pre-wrap}
  </style>
</head>
<body>
  <h1>Test API BOGO CAFE</h1>
  <p>Tempel Web App URL Apps Script kamu, lalu klik tombol tes.</p>

  <input id="url" placeholder="https://script.google.com/macros/s/xxxx/exec">

  <button onclick="ping()">Tes Koneksi</button>
  <button onclick="save()">Tes Simpan 1 Data</button>
  <button onclick="read()">Ambil Data</button>

  <pre id="out">Output akan muncul di sini...</pre>

<script>
const out = document.getElementById('out');

function apiUrl(action) {
  const base = document.getElementById('url').value.trim();
  if (!base) throw new Error('Web App URL wajib diisi');
  return base + (base.includes('?') ? '&' : '?') + 'action=' + action;
}

async function ping() {
  try {
    const res = await fetch(apiUrl('ping'));
    out.textContent = await res.text();
  } catch (e) {
    out.textContent = 'Error: ' + e.message;
  }
}

async function save() {
  try {
    const payload = {
      action: 'save',
      Tanggal: new Date().toISOString().slice(0, 10),
      Ayam: 50000,
      Sayur: 20000,
      Bumbu: 15000,
      Keterangan: 'Tes input dari quick-test.html'
    };

    const res = await fetch(apiUrl('save'), {
      method: 'POST',
      body: JSON.stringify(payload),
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }
    });

    out.textContent = await res.text();
  } catch (e) {
    out.textContent = 'Error: ' + e.message;
  }
}

async function read() {
  try {
    const res = await fetch(apiUrl('read'));
    out.textContent = JSON.stringify(await res.json(), null, 2);
  } catch (e) {
    out.textContent = 'Error: ' + e.message;
  }
}
</script>
</body>
</html>
